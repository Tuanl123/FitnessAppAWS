openapi: "3.1.0"
info:
  title: Fitness Tracker — User Service
  version: "0.1.0"
  description: User registration, authentication, and profile management.

servers:
  - url: http://localhost/api/users
    description: Local (Nginx proxy)

paths:
  /auth/register:
    post:
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, maxLength: 128 }
                name: { type: string, minLength: 1, maxLength: 100 }
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string, format: uuid }
                  email: { type: string }
                  name: { type: string }
                  access_token: { type: string }
                  refresh_token: { type: string }
                  token_type: { type: string, example: bearer }
        "409": { description: Email already registered }
        "422": { description: Validation error }

  /auth/login:
    post:
      summary: Authenticate and receive tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }
                  token_type: { type: string, example: bearer }
        "401": { description: Invalid credentials }

  /auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  token_type: { type: string, example: bearer }
        "401": { description: Expired or invalid refresh token }

  /profile:
    get:
      summary: Get current user profile
      operationId: getProfile
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401": { description: Unauthorized }
    put:
      summary: Update profile (partial)
      operationId: updateProfile
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
                age: { type: integer, minimum: 13, maximum: 120 }
                weight: { type: number, minimum: 20, maximum: 500 }
                fitness_goals: { type: string, maxLength: 500 }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  service: { type: string }
                  db: { type: string }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Profile:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        age: { type: integer, nullable: true }
        weight: { type: number, nullable: true }
        fitness_goals: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
